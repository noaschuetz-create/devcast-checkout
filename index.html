<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DevCast — Purchase Complete</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0F1117;
      color: #E2E8F0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
      gap: 16px;
      text-align: center;
    }
    h1 { color: #10B981; font-size: 28px; }
    p  { color: #94A3B8; max-width: 420px; line-height: 1.6; }
    .code {
      background: #1A1D27;
      border: 1px solid #2E3350;
      border-radius: 8px;
      padding: 12px 24px;
      font-family: monospace;
      font-size: 14px;
      color: #818CF8;
    }
  </style>
</head>
<body>
  <div style="font-size:56px">✅</div>
  <h1>Purchase Complete!</h1>
  <p>
    Return to <strong>DevCast</strong> — your license is being
    activated automatically. This may take up to 30 seconds.
  </p>
  <p>
    If activation does not complete, copy your Session ID below
    and paste it in DevCast → Trial modal → Manual activation.
  </p>
  <div class="code" id="session-id">Loading...</div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const sid    = params.get('session_id') || 'Not found';
    document.getElementById('session-id').textContent = sid;
  </script>
</body>
</html>
